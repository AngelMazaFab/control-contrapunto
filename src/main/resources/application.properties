# ==========================================
# 1. ACTUALIZA TU: src/main/resources/application.properties
# ==========================================

spring.application.name=control-contrapunto

# Conexión a Base de Datos (Variables de Entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
# En producción, ddl-auto debe ser 'validate' o 'none'. Usamos 'update' solo para desarrollo.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- CONFIGURACIÓN DE HIKARICP (ANTÍDOTO PARA DESCONEXIONES DE SUPABASE) ---

# 1. Consulta ultrarrápida para comprobar que la conexión sirve ANTES de usarla
spring.datasource.hikari.connection-test-query=SELECT 1

# 2. Tiempo máximo que una conexión puede vivir antes de renovarse (10 minutos)
# Supabase suele matar conexiones inactivas a los 15-30 minutos, así nos adelantamos.
spring.datasource.hikari.max-lifetime=600000

# 3. Tiempo de inactividad permitido antes de retirarla del pool (5 minutos)
spring.datasource.hikari.idle-timeout=300000

# 4. Enviar un "latido" (keepalive) cada 4 minutos para evitar que Supabase la cierre
spring.datasource.hikari.keepalive-time=240000

# 5. Limitar el máximo de conexiones simultáneas (Ideal para el tier gratuito de Supabase)
spring.datasource.hikari.maximum-pool-size=10

# 6. Deshabilitar Prepared Statements en el lado del servidor para evitar errores 500 intermitentes
# ("prepared statement does not exist") con el pooler de Supabase en modo Transaction (Puerto 6543).
# NOTA: Se aplicará directamente en la URL de conexión (.env.properties) usando &prepareThreshold=0

# ==========================================
# Reporte de Errores
# ==========================================
server.error.include-message=always
server.error.include-stacktrace=always