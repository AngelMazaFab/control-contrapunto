# 1. ACTUALIZA TU: src/main/resources/application.properties
# ==========================================
spring.application.name=control-contrapunto

# Conexión a Base de Datos (Variables de Entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
# En producción, ddl-auto debe ser 'validate' o 'none'. Usamos 'update' solo para desarrollo.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect