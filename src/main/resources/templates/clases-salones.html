<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Módulo Clases/Salones – Sistema de Control Contrapunto"/>
    <title>Clases / Salones | Control Contrapunto</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <!-- Bootstrap 5 CSS y Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        /* Estilos base: Tipografía y Layout coherente con el sistema */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            margin: 0;
            min-height: 100vh;
        }

        /* ── Bloque: Sub-navegación tipo Pill (Toggle Principal) ── */
        .subview-nav {
            background: #fff;
            border-radius: 14px;
            padding: 6px;
            display: inline-flex;
            gap: 4px;
            border: 1.5px solid #e9ecef;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .subview-btn {
            border: none;
            background: transparent;
            border-radius: 10px;
            padding: 8px 22px;
            font-size: 14px;
            font-weight: 500;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 7px;
        }
        .subview-btn.active {
            background: linear-gradient(135deg, #6f42c1, #5a32a3);
            color: #fff;
            box-shadow: 0 4px 12px rgba(111,66,193,0.35);
        }

        /* ── Bloque: Diseño de Tablas y Cuadrícula de Horarios ── */
        .content-card {
            background: #fff;
            border-radius: 16px;
            border: 1.5px solid #e9ecef;
            overflow: hidden;
        }
        .tabla-custom thead th {
            background: #f8f9fa;
            font-size: 12px; font-weight: 600;
            color: #6c757d; letter-spacing: 0.5px; text-transform: uppercase;
            border-bottom: 2px solid #e9ecef; padding: 12px 16px;
        }

        /* Estilos responsivos para Sidebar y Tablas */
        @media (max-width: 991px) {
            .main-content { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

<!-- Fragmento: Navegación lateral reutilizable -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>

<div class="main-content">

    <!-- Top Bar: Contexto de navegación -->
    <div class="topbar" style="background:#fff; padding:16px 32px; border-bottom:1px solid #e9ecef; display:flex; align-items:center; justify-content:space-between;">
        <div class="d-flex align-items-center gap-2">
            <button class="btn-hamburger" onclick="abrirSidebar()" style="display:none; background:none; border:none; font-size:22px;"><i class="bi bi-list"></i></button>
            <div>
                <div class="topbar-title" style="font-size:20px; font-weight:600; color:#1a1a2e;">Clases / Salones</div>
                <div class="topbar-breadcrumb" style="font-size:13px; color:#6c757d;">
                    <i class="bi bi-house-fill me-1"></i> <a th:href="@{/menu}" style="color:inherit; text-decoration:none;">Inicio</a> › Clases/Salones
                </div>
            </div>
        </div>
    </div>

    <!-- Área de Contenido Modular -->
    <div class="p-4 flex-grow-1">

        <!-- Selector de Sub-vista: Alterna entre paneles mediante JavaScript -->
        <div class="mb-4 d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div class="subview-nav" role="tablist">
                <button class="subview-btn active" id="btn-tab-salones" onclick="cambiarSubvista('salones')">
                    <i class="bi bi-building"></i> Salones
                </button>
                <button class="subview-btn" id="btn-tab-clases" onclick="cambiarSubvista('clases')">
                    <i class="bi bi-calendar3-week"></i> Clases
                </button>
                <button class="subview-btn" id="btn-tab-talleres" onclick="cambiarSubvista('talleres')">
                    <i class="bi bi-vinyl-fill"></i> Talleres
                </button>
            </div>
        </div>

        <!-- PANEL: Catálogo de Salones -->
        <div id="panel-salones" class="subview-panel active">
            <div class="content-card">
                <div class="content-card-header" style="padding:18px 24px; border-bottom:1px solid #f0f2f5; display:flex; justify-content:space-between;">
                    <div class="content-card-title" style="font-weight:600;"><i class="bi bi-building me-2" style="color:#6f42c1;"></i>Gestión de Aulas</div>
                    <button class="btn btn-sm btn-primary" onclick="abrirModalNuevoSalon()" style="background:linear-gradient(135deg,#6f42c1,#5a32a3); border:none; border-radius:10px;">
                        <i class="bi bi-plus-lg"></i> Nuevo Salón
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table tabla-custom mb-0">
                        <thead><tr><th>ID</th><th>Nombre</th><th style="text-align:center;">Acciones</th></tr></thead>
                        <tbody>
                            <tr th:each="salon : ${salones}">
                                <td th:text="${salon.id}"></td>
                                <td th:text="${salon.nombre}"></td>
                                <td style="text-align:center;">
                                    <button class="btn btn-sm btn-outline-secondary" th:onclick="abrirModalEditarSalon([[${salon.id}]], [[${salon.nombre}]])"><i class="bi bi-pencil-fill"></i></button>
                                    <a class="btn btn-sm btn-outline-danger" th:href="@{/salones/eliminar/{id}(id=${salon.id})}" onclick="return confirm('¿Eliminar salón?');"><i class="bi bi-trash3-fill"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- PANEL: Agenda Semanal (Cuadrícula de Horarios) -->
        <div id="panel-clases" class="subview-panel d-none">
            <!-- Bloque: Datos Ocultos (Thymeleaf) consumidos por el motor de renderizado JS -->
            <div id="clases-data" class="d-none">
                <div th:each="c : ${listClases}" class="clase-item" 
                     th:data-id="${c.idClase}" th:data-hora-inicio="${c.horaInicio}" th:data-dia="${c.diaSemana.nombreDia}">
                     <!-- Atributos adicionales mapeados para el tooltip de la agenda -->
                </div>
            </div>

            <div class="content-card">
                <div class="table-responsive">
                    <table class="table tabla-custom mb-0" id="tabla-horarios">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th th:each="dia : ${listDiasSemana}" th:text="${dia.nombreDia}"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Generado por buildHorario() en script -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Modal: Registro de Clase (Cargado dinámicamente al clickear una celda vacía) -->
<div class="modal fade" id="modalClase" tabindex="-1">
    <!-- Formulario de Clase con selectores de Alumno, Profesor y Materia -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /* Bloque Script: Lógica de Interacción del Módulo */
    // - buildHorario(): Cruza los bloques de 60min con las clases registradas en el servidor.
    // - cambiarSubvista(): Maneja la visibilidad de paneles y persiste el estado en la sesión del navegador.
    // ...
</script>
</body>
</html>
