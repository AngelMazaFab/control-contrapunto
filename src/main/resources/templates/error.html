<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error | Control Contrapunto</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 32px rgba(0,0,0,0.06);
            border: 1px solid #e9ecef;
        }

        .error-icon {
            font-size: 64px;
            color: #dc3545;
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .error-desc {
            font-size: 15px;
            color: #6c757d;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-return {
            background: #1a1a2e;
            color: #fff;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-return:hover {
            background: #0f3460;
            color: #fff;
            transform: translateY(-2px);
        }

        .error-details {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: left;
            font-size: 13px;
            color: #495057;
            border: 1px solid #dee2e6;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div class="error-card">
        <div class="error-icon">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>
        
        <h1 class="error-title">¡Ups! Algo salió mal</h1>
        
        <p class="error-desc">
            Ha ocurrido un error inesperado al procesar tu solicitud. Nuestro equipo técnico ha sido notificado.
        </p>

        <a th:href="@{/menu}" class="btn-return">
            <i class="bi bi-arrow-left"></i> Volver al Menú Principal
        </a>

        <!-- Mostrar detalles del error si están disponibles en el modelo -->
        <div class="error-details" th:if="${message != null and message != ''}">
            <strong>Detalles del error:</strong>
            <p class="mb-1 mt-2 text-danger" th:text="${status + ' - ' + error}">500 - Internal Server Error</p>
            <p class="mb-0 text-muted" style="font-family: monospace;" th:text="${message}">Mensaje de error</p>
        </div>
    </div>

</body>
</html>
