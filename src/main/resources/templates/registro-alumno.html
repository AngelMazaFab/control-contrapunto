<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Registro de Alumno – Control Contrapunto"/>
    <title>Registro de Alumno | Control Contrapunto</title>

    <!-- Google Fonts y Estilos Visuales -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        /* Estilos base del formulario */
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; }
        .main-content { margin-left: 260px; min-height: 100vh; }

        .card-form {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
        }

        /* Ajustes responsivos */
        @media (max-width: 991px) { .main-content { margin-left: 0 !important; } }
    </style>
</head>
<body>

<!-- Fragmento: Navegación lateral lateral -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>

<div class="main-content" style="padding: 2rem;">

    <!-- Top Bar: Migas de pan para navegación contextual -->
    <div class="topbar mb-4" style="background:#fff; padding:16px 32px; border-bottom:1px solid #e9ecef; display:flex; align-items:center; justify-content:space-between;">
        <div class="topbar-breadcrumb" style="font-size:13px; color:#6c757d;">
            <i class="bi bi-house-fill me-1"></i> <a th:href="@{/menu}" style="color:inherit; text-decoration:none;">Inicio</a> / 
            <a th:href="@{/alumnos}" style="color:inherit; text-decoration:none;">Alumnos</a> / Registro
        </div>
    </div>

    <div class="container-fluid px-0">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card-form">
                    <!-- Encabezado Dinámico: Depende de la presencia de un ID (Modo Edición vs Creación) -->
                    <h4 class="mb-4" style="color: #1a1a2e; font-weight: 600;" 
                        th:text="${alumno.idAlumno != null ? 'Modificar Alumno' : 'Nuevo Alumno'}"></h4>
                    
                    <form th:action="@{${alumno.idAlumno != null ? '/alumnos/actualizar/' + alumno.idAlumno : '/alumnos/guardar'}}" method="post">
                        
                        <!-- Bloque: Datos Identificativos -->
                        <div class="mb-4">
                            <label class="form-label fw-medium">Nombre Completo</label>
                            <input type="text" class="form-control" name="nombre" th:value="${alumno.nombreAlumno}" placeholder="Nombre del alumno" required>
                        </div>

                        <!-- Bloque: Medios de Contacto Dinámicos (Teléfonos) -->
                        <div class="mb-4">
                            <label class="form-label fw-medium d-flex justify-content-between align-items-center">
                                Teléfonos
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="agregarTelefono()" title="Añadir campo">+</button>
                            </label>
                            <div id="contenedorTelefonos">
                                <!-- Thymeleaf itera sobre la lista de strings (teléfonos) mapeada por el controlador -->
                                <div class="input-group mb-2" th:each="tel : ${listaTelefonos}">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="text" class="form-control" name="telefonos[]" th:value="${tel}">
                                    <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()"><i class="bi bi-x-lg"></i></button>
                                </div>
                            </div>
                        </div>

                        <!-- Bloque: Medios de Contacto Dinámicos (Correos) -->
                        <div class="mb-4">
                            <label class="form-label fw-medium d-flex justify-content-between align-items-center">
                                Correos <button type="button" class="btn btn-sm btn-outline-success" onclick="agregarCorreo()">+</button>
                            </label>
                            <div id="contenedorCorreos">
                                <div class="input-group mb-2" th:each="mail : ${listaCorreos}">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" name="correos[]" th:value="${mail}">
                                    <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()"><i class="bi bi-x-lg"></i></button>
                                </div>
                            </div>
                        </div>

                        <!-- Acciones de Formulario -->
                        <div class="d-flex justify-content-end gap-2 mt-5">
                            <a th:href="@{/alumnos}" class="btn btn-light" style="border-radius:8px; padding:10px 20px;">Cancelar</a>
                            <button type="submit" class="btn btn-primary" style="background-color: #FD7E14; border:none; border-radius:8px; padding:10px 20px; font-weight:600;">Aceptar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Bloque Script: Gestión Dinámica de Campos de Contacto -->
<script>
    function agregarTelefono() {
        // Inserta un nuevo grupo de input en el DOM para capturar múltiples teléfonos en el array "telefonos[]"
    }
    function agregarCorreo() {
        // Inserta un nuevo grupo de input para "correos[]"
    }
</script>
</body>
</html>
