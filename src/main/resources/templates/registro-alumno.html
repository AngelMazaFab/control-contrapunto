<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Registro de Alumno – Control Contrapunto"/>
    <title>Registro de Alumno | Control Contrapunto</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            margin: 0;
        }

        /* ── Sidebar (estilos que consume navbar.html) ── */
        .sidebar-link {
            font-size: 14px;
            font-weight: 500;
            color: #8b9db5;
            padding: 10px 14px;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }
        .sidebar-link:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
            transform: translateX(3px);
        }
        .sidebar-link.active {
            background: rgba(253,126,20,0.15);
            color: #FD7E14 !important;
            border-left: 3px solid #FD7E14;
        }
        .sidebar-link-logout {
            font-size: 13px;
            font-weight: 500;
            color: #8b9db5;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .sidebar-link-logout:hover {
            background: rgba(220,53,69,0.12);
            color: #e74c3c;
        }

        /* ── Contenido principal ── */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
        }

        /* ── Top bar ── */
        .topbar {
            background: #fff;
            padding: 16px 32px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .topbar-breadcrumb {
            font-size: 13px;
            color: #6c757d;
        }

        .card-form {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        /* ── Hamburger button ── */
        .btn-hamburger {
            display: none;
            background: none;
            border: none;
            color: #495057;
            font-size: 22px;
            padding: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-hamburger:hover { background: #f0f2f5; }

        /* Responsive */
        @media (max-width: 991px) {
            .btn-hamburger { display: inline-flex; align-items: center; }
            .main-content  { margin-left: 0 !important; }
            .topbar { padding: 12px 16px; }
            .topbar-title { font-size: 17px; }
        }
        @media (max-width: 576px) {
            .topbar-breadcrumb { display: none; }
            .card-form { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- ── Barra de navegación lateral (fragmento reutilizable) ── -->
<div th:replace="~{fragments/navbar :: sidebar}"></div>

<!-- ── Contenido principal ── -->
<div class="main-content" style="padding: 2rem;">

    <!-- Top Bar -->
    <div class="topbar mx-n4 mt-n4 mb-4">
        <div class="d-flex align-items-center gap-2">
            <button class="btn-hamburger" onclick="abrirSidebar()" aria-label="Abrir menú">
                <i class="bi bi-list"></i>
            </button>
            <div>
                <div class="topbar-title">Registro de Alumno</div>
                <div class="topbar-breadcrumb">
                    <i class="bi bi-house-fill me-1"></i>
                    <a th:href="@{/menu}" style="color:#6c757d; text-decoration:none;">Inicio</a>
                    <span class="mx-1">/</span>
                    <a th:href="@{/alumnos}" style="color:#6c757d; text-decoration:none;">Alumnos</a>
                    <span class="mx-1">/</span> Registro
                </div>
            </div>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span class="badge text-bg-light border d-none d-sm-inline-flex" style="font-size:13px; padding:8px 14px;">
                <i class="bi bi-person-circle me-1" style="color:#FD7E14;"></i>
                <span th:text="${usuarioActivo}">Administrador</span>
            </span>
            <a th:href="@{/logout}"
               class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1"
               style="border-radius:8px; font-size:13px;">
                <i class="bi bi-box-arrow-right"></i> <span class="d-none d-sm-inline">Salir</span>
            </a>
        </div>
    </div>

    <!-- Área de contenido -->
    <div class="container-fluid px-0">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card-form">
                    <h4 class="mb-4" style="color: #1a1a2e; font-weight: 600;" 
                        th:text="${alumno.idAlumno != null ? 'Modificar Alumno' : 'Nuevo Alumno'}">
                        Nuevo Alumno
                    </h4>
                    
                    <form th:action="@{${alumno.idAlumno != null ? '/alumnos/actualizar/' + alumno.idAlumno : '/alumnos/guardar'}}" method="post">
                        
                        <!-- Nombre del Alumno -->
                        <div class="mb-4">
                            <label for="nombre" class="form-label fw-medium">Nombre Completo</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" 
                                   th:value="${alumno.nombreAlumno}" placeholder="Ej. Juan Pérez" required>
                        </div>

                        <!-- Teléfonos -->
                        <div class="mb-4">
                            <label class="form-label fw-medium d-flex justify-content-between align-items-center">
                                Teléfonos
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="agregarTelefono()" title="Agregar teléfono">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </label>
                            <div id="contenedorTelefonos">
                                <!-- Elementos existentes -->
                                <div class="input-group mb-2" th:each="tel : ${listaTelefonos}">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="text" class="form-control" name="telefonos[]" th:value="${tel}" placeholder="Número de teléfono">
                                    <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()" title="Eliminar">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                                <!-- Elemento vacío por defecto si no hay existentes -->
                                <div class="input-group mb-2" th:if="${listaTelefonos == null or #lists.isEmpty(listaTelefonos)}">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="text" class="form-control" name="telefonos[]" placeholder="Número de teléfono">
                                </div>
                            </div>
                        </div>

                        <!-- Correos -->
                        <div class="mb-4">
                            <label class="form-label fw-medium d-flex justify-content-between align-items-center">
                                Correos Electrónicos
                                <button type="button" class="btn btn-sm btn-outline-success" onclick="agregarCorreo()" title="Agregar correo">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </label>
                            <div id="contenedorCorreos">
                                <!-- Elementos existentes -->
                                <div class="input-group mb-2" th:each="mail : ${listaCorreos}">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" name="correos[]" th:value="${mail}" placeholder="correo@ejemplo.com">
                                    <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()" title="Eliminar">
                                        <i class="bi bi-x-lg"></i>
                                    </button>
                                </div>
                                <!-- Elemento vacío por defecto si no hay existentes -->
                                <div class="input-group mb-2" th:if="${listaCorreos == null or #lists.isEmpty(listaCorreos)}">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" name="correos[]" placeholder="correo@ejemplo.com">
                                </div>
                            </div>
                        </div>

                        <!-- Botones de Acción -->
                        <div class="d-flex justify-content-end gap-2 mt-5">
                            <a th:href="@{/alumnos}" class="btn" style="background-color: #CED4DA; color: #495057; font-weight: 500; border-radius: 8px; padding: 10px 20px;">
                                Cancelar
                            </a>
                            <button type="submit" class="btn" style="background-color: #FD7E14; color: white; font-weight: 600; border-radius: 8px; padding: 10px 20px;"
                                    th:text="${alumno.idAlumno != null ? 'Actualizar' : 'Aceptar'}">
                                Aceptar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script para campos dinámicos -->
<script>
    function agregarTelefono() {
        const contenedor = document.getElementById('contenedorTelefonos');
        const nuevoInput = document.createElement('div');
        nuevoInput.className = 'input-group mb-2';
        nuevoInput.innerHTML = `
            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
            <input type="text" class="form-control" name="telefonos[]" placeholder="Número de teléfono">
            <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()" title="Eliminar">
                <i class="bi bi-x-lg"></i>
            </button>
        `;
        contenedor.appendChild(nuevoInput);
    }

    function agregarCorreo() {
        const contenedor = document.getElementById('contenedorCorreos');
        const nuevoInput = document.createElement('div');
        nuevoInput.className = 'input-group mb-2';
        nuevoInput.innerHTML = `
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" name="correos[]" placeholder="correo@ejemplo.com">
            <button class="btn btn-outline-danger" type="button" onclick="this.parentElement.remove()" title="Eliminar">
                <i class="bi bi-x-lg"></i>
            </button>
        `;
        contenedor.appendChild(nuevoInput);
    }
</script>
</body>
</html>
